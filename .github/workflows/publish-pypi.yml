name: publish-pypi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build & publish prgenius-core to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # optional but recommended for Trusted Publisher

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Use [dev] extras so we also pick up build/twine for local validation
          pip install -e "prgenius[dev]" || pip install build twine

      - name: Build sdist + wheel
        working-directory: prgenius
        run: python -m build

      - name: Smoke-test the built wheel
        working-directory: prgenius
        run: |
          python -m pip install --force-reinstall dist/prgenius_core-*.whl
          python -m prgenius --version
          python -c "import prgenius; print('__version__:', prgenius.__version__)"

      - name: Publish to PyPI via Trusted Publisher (OIDC)
        working-directory: prgenius
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token — Trusted Publisher is configured in PyPI project
        # settings to allow this workflow (owner=zsxh1990, repo=pr-genius,
        # workflow=.github/workflows/publish-pypi.yml, env=pypi).